default: &default
  adapter: postgresql
  encoding: utf8
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: 127.0.0.1
  username: postgres
  password: postgres
  port: 5432

development:
  primary:
    <<: *default
    database: <%= ENV['WORKY_DATABASE'] || 'worky-prod' %>
  queue:
    <<: *default
    database: <%= ENV['WORKY_QUEUE_DATABASE'] || 'worky-prod-queue' %>
    migrations_paths: db/queue_migrate

test:
  primary:
    <<: *default
    database: worky-test
  queue:
    <<: *default
    database: worky-test-queue
    migrations_paths: db/queue_migrate

production: &production
  primary:
    <<: *default
    database: <%= ENV['WORKY_DATABASE'] %>
  queue:
    <<: *default
    database: <%= ENV['WORKY_QUEUE_DATABASE'] %>
    migrations_paths: db/queue_migrate

cable:
  <<: *production

cache:
  <<: *production